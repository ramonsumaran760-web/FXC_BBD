<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artemis Roulette - Professional Casino 3D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
  <style>
    :root { --bg: #0a0a0a; --text: #f1eee4; --muted: #9a9b8d; --gold: #d4af37; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100vh; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; overflow: hidden; }
    .container { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
    .canvas-area { position: relative; background: #050505; }
    canvas { display: block; width: 100%; height: 100%; }
    .side { overflow-y: auto; border-left: 1px solid #303326; background: rgba(10, 10, 10, .98); padding: 14px; }
    .panel-head { font-weight: 700; font-size: 13px; margin: 12px 0 8px 0; padding-bottom: 8px; border-bottom: 1px solid #303326; }
    .control-group { margin: 10px 0; padding: 8px; background: #0d0e0b; border: 1px solid #303326; border-radius: 6px; }
    .control-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    input[type="range"] { width: 100%; margin-bottom: 4px; cursor: pointer; }
    button { width: 100%; height: 32px; border: 1px solid #303326; background: #1a1b15; color: var(--text); border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 6px; transition: all .15s; }
    button:hover { border-color: var(--gold); background: #222318; }
    button.primary { background: #24200f; border-color: rgba(212, 175, 55, .72); color: var(--gold); }
    .toolbar { display: flex; gap: 6px; margin: 8px 0; }
    .toolbar button { margin: 0; }
    .metric { margin: 8px 0; padding: 8px; background: #0d0e0b; border: 1px solid #303326; border-radius: 6px; font-size: 12px; }
    .metric-value { font-size: 16px; font-weight: 900; color: var(--gold); margin-top: 2px; }
    .hud { position: absolute; top: 16px; left: 16px; background: rgba(10, 10, 10, .9); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, .26); border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.5; min-width: 200px; }
    .hud-value { color: var(--gold); font-weight: 700; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0e0b; }
    ::-webkit-scrollbar-thumb { background: #44472f; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="canvas-area">
      <canvas id="canvas"></canvas>
      <div class="hud">
        <div>ESTADO: <span class="hud-value" id="hudState">Listo</span></div>
        <div>BOLA: <span class="hud-value" id="hudBall">0 m/s</span></div>
        <div>RUEDA: <span class="hud-value" id="hudWheel">0 RPM</span></div>
        <div style="margin-top: 8px; border-top: 1px solid #303326; padding-top: 8px;">RESULTADO: <span class="hud-value" id="hudResult">--</span></div>
      </div>
    </div>

    <div class="side">
      <div class="panel-head">🎰 CONTROL LANZAMIENTO</div>

      <div class="control-group">
        <label>Velocidad: <span id="speedVal">8.0</span> m/s</label>
        <input type="range" id="speedSlider" min="5" max="15" step="0.5" value="8" />
      </div>

      <div class="control-group">
        <label>Ángulo: <span id="angleVal">0</span>°</label>
        <input type="range" id="angleSlider" min="-45" max="45" step="5" value="0" />
      </div>

      <div class="control-group">
        <label>RPM Rueda: <span id="rpmVal">4.0</span></label>
        <input type="range" id="rpmSlider" min="0" max="12" step="0.5" value="4" />
      </div>

      <div class="toolbar">
        <button id="launchBtn" class="primary">▶ LANZAR</button>
        <button id="resetBtn">↻ RESET</button>
      </div>

      <div class="panel-head" style="margin-top: 14px;">📊 RESULTADO</div>

      <div class="metric">
        <div style="color: var(--muted);">Última tirada</div>
        <div class="metric-value" id="lastResult">--</div>
      </div>

      <div class="panel-head" style="margin-top: 14px;">📈 HISTORIAL</div>

      <div id="historyList" style="font-size: 11px; color: #dcd4bc; max-height: 100px; overflow-y: auto; border: 1px solid #303326; border-radius: 4px; padding: 6px; background: #0a0b08; line-height: 1.6;">
        <div style="color: var(--muted);">Sin tiradas</div>
      </div>
    </div>
  </div>

  <script>
    const WHEEL = ["0","28","9","26","30","11","7","20","32","17","5","22","34","15","3","24","36","13","1","00","27","10","25","29","12","8","19","31","18","6","21","33","16","4","23","35","14","2"];
    const RED = new Set(["1","3","5","7","9","12","14","16","18","19","21","23","25","27","30","32","34","36"]);
    const slotAngle = (Math.PI * 2) / WHEEL.length;

    let history = [];
    let isSpinning = false;
    let wheelRotation = 0;
    let wheelAngularSpeed = 0;

    // ===== THREE.JS SETUP =====
    const canvas = document.getElementById("canvas");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.06);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 4.2, 5.8);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 5;
    controls.maxDistance = 12;
    controls.target.set(0, 0.1, 0);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ===== LIGHTING (3-Point Setup) =====
    const keyLight = new THREE.DirectionalLight(0xfff4e0, 3.8);
    keyLight.position.set(6, 12, 6);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.left = -10;
    keyLight.shadow.camera.right = 10;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    keyLight.shadow.camera.far = 50;
    keyLight.shadow.bias = -0.0008;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xcfe0ff, 1.2);
    fillLight.position.set(-8, 5, -4);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xffcc66, 2.2, 20);
    rimLight.position.set(0, 4, -8);
    scene.add(rimLight);

    const ambientLight = new THREE.AmbientLight(0x505050, 0.5);
    scene.add(ambientLight);

    // ===== PBR MATERIALS =====
    const matGold = new THREE.MeshPhysicalMaterial({
      color: 0xd4af37,
      metalness: 1.0,
      roughness: 0.12,
      clearcoat: 0.4,
      clearcoatRoughness: 0.1,
    });

    const matWood = new THREE.MeshPhysicalMaterial({
      color: 0x4a2c1a,
      metalness: 0.0,
      roughness: 0.35,
      clearcoat: 0.5,
      clearcoatRoughness: 0.25,
    });

    const matRed = new THREE.MeshStandardMaterial({
      color: 0xb22222,
      metalness: 0.15,
      roughness: 0.45,
    });

    const matBlack = new THREE.MeshStandardMaterial({
      color: 0x0d0d0d,
      metalness: 0.15,
      roughness: 0.45,
    });

    const matGreen = new THREE.MeshStandardMaterial({
      color: 0x0a5c2e,
      metalness: 0.15,
      roughness: 0.45,
    });

    const matBall = new THREE.MeshPhysicalMaterial({
      color: 0xfaf6ef,
      metalness: 0.0,
      roughness: 0.08,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05,
    });

    const matGlass = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transmission: 0.95,
      thickness: 0.1,
      roughness: 0.05,
      metalness: 0,
      clearcoat: 0,
    });

    // ===== GEOMETRIES & MESHES =====
    const wheelGroup = new THREE.Group();
    scene.add(wheelGroup);

    // Números en la rueda
    WHEEL.forEach((num, idx) => {
      const start = idx * slotAngle - slotAngle / 2;
      const end = idx * slotAngle + slotAngle / 2;
      const mat = RED.has(num) ? matRed : (num === "0" || num === "00" ? matGreen : matBlack);

      const geom = new THREE.RingGeometry(0.75, 1.45, 12, 1, start, end - start);
      geom.rotateX(-Math.PI / 2);
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.y = 0.01;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      wheelGroup.add(mesh);
    });

    // Centro dorado
    const centerGeom = new THREE.SphereGeometry(0.24, 64, 32);
    const centerMesh = new THREE.Mesh(centerGeom, matGold);
    centerMesh.position.y = 0.42;
    centerMesh.castShadow = true;
    centerMesh.receiveShadow = true;
    wheelGroup.add(centerMesh);

    // Cono dorado interior
    const coneGeom = new THREE.CylinderGeometry(0.2, 0.7, 0.45, 48);
    const coneMesh = new THREE.Mesh(coneGeom, matGold);
    coneMesh.position.y = 0.15;
    coneMesh.castShadow = true;
    coneMesh.receiveShadow = true;
    wheelGroup.add(coneMesh);

    // Mesa de madera
    const tableGeom = new THREE.CylinderGeometry(2.6, 2.9, 0.16, 128);
    const tableMesh = new THREE.Mesh(tableGeom, matWood);
    tableMesh.position.y = -0.14;
    tableMesh.castShadow = true;
    tableMesh.receiveShadow = true;
    scene.add(tableMesh);

    // Borde dorado de la mesa
    const rimGeom = new THREE.TorusGeometry(2.6, 0.06, 16, 100);
    const rimMesh = new THREE.Mesh(rimGeom, matGold);
    rimMesh.rotation.x = Math.PI / 2;
    rimMesh.position.y = 0.04;
    rimMesh.castShadow = true;
    rimMesh.receiveShadow = true;
    scene.add(rimMesh);

    // Bola (marfil realista)
    const ballGeom = new THREE.SphereGeometry(0.062, 64, 32);
    const ballMesh = new THREE.Mesh(ballGeom, matBall);
    ballMesh.position.set(0, 2, 3);
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);

    // Deflectores (pines de latón)
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const pinGeom = new THREE.SphereGeometry(0.09, 32, 16);
      const pinMesh = new THREE.Mesh(pinGeom, matGold);
      pinMesh.position.set(Math.cos(angle) * 3.3, 0.18, Math.sin(angle) * 3.3);
      pinMesh.castShadow = true;
      pinMesh.receiveShadow = true;
      scene.add(pinMesh);
    }

    // DOMO DE VIDRIO (cilindro transparente que encierra la ruleta)
    const domeGeom = new THREE.CylinderGeometry(3.5, 3.5, 4.5, 64, 1, true);
    const domeMesh = new THREE.Mesh(domeGeom, matGlass);
    domeMesh.position.y = 1.8;
    domeMesh.castShadow = false;
    domeMesh.receiveShadow = true;
    scene.add(domeMesh);

    // ===== PHYSICS SIMULATION (Simplified) =====
    let ballVel = new THREE.Vector3();
    let ballPos = new THREE.Vector3(0, 2, 3);
    let ballRot = 0;

    function launch(speed, angle, rpm) {
      if (isSpinning) return;
      isSpinning = true;
      const radAngle = (angle * Math.PI) / 180;
      ballVel.set(Math.sin(radAngle) * speed, 0, -Math.cos(radAngle) * speed);
      ballPos.set(0, 1.3, 2.9);
      ballRot = 0;
      wheelAngularSpeed = (rpm * Math.PI * 2) / 60;
      document.getElementById("hudState").textContent = "Girando";
    }

    function reset() {
      ballPos.set(0, 2, 3);
      ballVel.set(0, 0, 0);
      wheelRotation = 0;
      wheelAngularSpeed = 0;
      wheelGroup.rotation.z = 0;
      isSpinning = false;
      document.getElementById("hudState").textContent = "Listo";
    }

    function getResult() {
      const angle = Math.atan2(ballMesh.position.z, ballMesh.position.x);
      const norm = ((angle + Math.PI) % (Math.PI * 2)) / slotAngle;
      return WHEEL[Math.round(norm) % WHEEL.length];
    }

    function addHistory(num) {
      history.unshift(num);
      if (history.length > 10) history.pop();
      const list = document.getElementById("historyList");
      list.innerHTML = history.map(n => `<div>${n}</div>`).join("");
    }

    // ===== ANIMATION LOOP =====
    const clock = new THREE.Clock();
    let spinTimeout = null;

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      // Rueda
      wheelAngularSpeed *= 0.998;
      wheelRotation += wheelAngularSpeed * dt;
      wheelGroup.rotation.z = wheelRotation;

      // Bola
      if (isSpinning) {
        ballVel.y -= 9.82 * dt;
        ballPos.addScaledVector(ballVel, dt);
        ballVel.multiplyScalar(Math.pow(0.985, dt));

        // Colisión con mesa
        const distFromCenter = new THREE.Vector2(ballPos.x, ballPos.z).length();
        if (distFromCenter > 2.4 || ballPos.y < 0.12) {
          ballPos.y = 0.15;
          ballVel.y *= -0.25;
          ballVel.multiplyScalar(0.65);
        }

        ballMesh.position.copy(ballPos);
        ballRot += ballVel.length() * 0.5;
        ballMesh.rotation.x = ballRot;

        document.getElementById("hudBall").textContent = ballVel.length().toFixed(2) + " m/s";
      }

      document.getElementById("hudWheel").textContent = (wheelAngularSpeed * 9.55).toFixed(1) + " RPM";

      // Detectar fin de spin
      if (isSpinning && ballVel.length() < 0.06 && wheelAngularSpeed < 0.03) {
        if (!spinTimeout) {
          spinTimeout = setTimeout(() => {
            const result = getResult();
            document.getElementById("hudResult").textContent = result;
            document.getElementById("lastResult").textContent = result;
            addHistory(result);
            document.getElementById("hudState").textContent = "Resultado: " + result;
            isSpinning = false;
            spinTimeout = null;
          }, 400);
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    // ===== EVENTS =====
    document.getElementById("launchBtn").addEventListener("click", () => {
      launch(
        parseFloat(document.getElementById("speedSlider").value),
        parseFloat(document.getElementById("angleSlider").value),
        parseFloat(document.getElementById("rpmSlider").value)
      );
    });

    document.getElementById("resetBtn").addEventListener("click", reset);
    document.getElementById("speedSlider").addEventListener("input", e => document.getElementById("speedVal").textContent = e.target.value);
    document.getElementById("angleSlider").addEventListener("input", e => document.getElementById("angleVal").textContent = e.target.value);
    document.getElementById("rpmSlider").addEventListener("input", e => document.getElementById("rpmVal").textContent = e.target.value);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
