<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #090807;
    }
    #lienzo-envoltorio {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    <script>
  /* ================= Motor 3D de la ruleta ================= */
  /* Expone window.Ruleta3D = { numeros, colorDe, girarHacia(numero, onFin) } */

  (function(){
  const NUMEROS_ORDEN = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const ROJOS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  /* colores mas saturados e intensos, con negro realmente negro */
  function colorDe(n){ if(n===0) return 0x0a6b32; return ROJOS.has(n) ? 0xa8161a : 0x080808; }

  const escena = new THREE.Scene();
  escena.fog = new THREE.Fog(0x0a0808, 16, 40);

  const canvas = document.getElementById('lienzo');
  const contenedor = document.getElementById('lienzo-envoltorio');
  const camara = new THREE.PerspectiveCamera(32, 1, 0.1, 100);

  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.74;

  function ajustarTamano(){
    const w = contenedor.clientWidth, h = contenedor.clientHeight;
    renderer.setSize(w,h,false);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    camara.aspect = w/h;
    camara.updateProjectionMatrix();
  }
  window.addEventListener('resize', ajustarTamano);

  /* ---------- luces ---------- */
  escena.add(new THREE.HemisphereLight(0x9fb0c2, 0x1a140c, 0.28));
  const clave = new THREE.DirectionalLight(0xffd9a0, 1.35);
  clave.position.set(5, 12, 6);
  clave.castShadow = true;
  clave.shadow.mapSize.set(2048,2048);
  clave.shadow.camera.left = -9; clave.shadow.camera.right = 9;
  clave.shadow.camera.top = 9; clave.shadow.camera.bottom = -9;
  clave.shadow.camera.near = 1; clave.shadow.camera.far = 40;
  clave.shadow.bias = -0.0025;
  escena.add(clave);
  const relleno = new THREE.PointLight(0xdfe9ff, 0.4, 30);
  relleno.position.set(-7, 5, -4);
  escena.add(relleno);
  const borde = new THREE.SpotLight(0xfff3d6, 0.8, 30, Math.PI/5, 0.5);
  borde.position.set(0, 10, -9);
  escena.add(borde);
  /* luz cenital dedicada a las casillas/numeros: las ilumina de lleno para que
     los colores (rojo, negro, verde) y los digitos se lean nitidos desde la camara */
  const focoNumeros = new THREE.SpotLight(0xfff7e6, 0.7, 22, Math.PI/3.4, 0.5, 1.4);
  focoNumeros.position.set(0, 9.5, 2.5);
  focoNumeros.castShadow = false;
  escena.add(focoNumeros);
  escena.add(focoNumeros.target);
  focoNumeros.target.position.set(0, 0, 0);
  /* relleno suave rasante para levantar el brillo de las paredes de las casillas */
  const rasante = new THREE.PointLight(0xffffff, 0.14, 14);
  rasante.position.set(0, 1.6, 6.5);
  escena.add(rasante);

  /* ---------- suelo ---------- */
  const sueloMat = new THREE.MeshStandardMaterial({color:0x0a0808, roughness:0.9, metalness:0.05});
  const suelo = new THREE.Mesh(new THREE.CircleGeometry(30,64), sueloMat);
  suelo.rotation.x = -Math.PI/2;
  suelo.position.y = -2.4;
  suelo.receiveShadow = true;
  escena.add(suelo);

  /* ---------- mesa de ruleta: la rueda debe verse montada/encastrada, no flotando ---------- */
  const fieltroMat = new THREE.MeshStandardMaterial({color:0x0b3d24, roughness:0.95, metalness:0.0});
  const fieltro = new THREE.Mesh(new THREE.CircleGeometry(11.5, 96), fieltroMat);
  fieltro.rotation.x = -Math.PI/2;
  fieltro.position.y = -1.62;
  fieltro.receiveShadow = true;
  escena.add(fieltro);

  const rebordeMesaMat = new THREE.MeshStandardMaterial({color:0x1d0f06, roughness:0.55, metalness:0.15});
  const rebordeMesa = new THREE.Mesh(new THREE.CylinderGeometry(11.9, 11.5, 0.55, 96, 1, true), rebordeMesaMat);
  rebordeMesa.position.y = -1.9;
  rebordeMesa.receiveShadow = true;
  escena.add(rebordeMesa);

  const filoMesaMat = new THREE.MeshStandardMaterial({color:0x2a1608, roughness:0.4, metalness:0.2});
  const filoMesa = new THREE.Mesh(new THREE.TorusGeometry(11.9, 0.16, 12, 96), filoMesaMat);
  filoMesa.rotation.x = Math.PI/2;
  filoMesa.position.y = -1.62;
  escena.add(filoMesa);

  /* ================= grupo raiz ================= */
  const wheelAssembly = new THREE.Group();
  escena.add(wheelAssembly);

  /* ================= dimensiones ================= */
  const R_INT = 3.15, R_EXT = 4.35, R_MADERA = 6.55, GROSOR_MADERA = 1.75, ALTO_CASILLA = 0.62;
  const N = NUMEROS_ORDEN.length;
  const PASO = (Math.PI*2)/N;

  /* ================= materiales (cromo en vez de oro) ================= */
  const cromoMat = new THREE.MeshStandardMaterial({color:0xd3d7db, metalness:0.95, roughness:0.18});
  const cromoOscuroMat = new THREE.MeshStandardMaterial({color:0x8b9298, metalness:0.9, roughness:0.28});

  /* ---- textura de madera procedural (vetas), mucho mas natural que un color plano ---- */
  function generarTexturaMadera(tonoBase, tonoVeta, repeticionesU, repeticionesV){
    const w = 512, h = 512;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = tonoBase; ctx.fillRect(0,0,w,h);
    // vetas onduladas horizontales, con variacion de grosor y opacidad
    const nLineas = 46;
    for(let i=0;i<nLineas;i++){
      const yBase = (i/nLineas)*h + (Math.random()-0.5)*6;
      ctx.strokeStyle = tonoVeta;
      ctx.globalAlpha = 0.10 + Math.random()*0.22;
      ctx.lineWidth = 0.6 + Math.random()*2.2;
      ctx.beginPath();
      const amp = 4 + Math.random()*10;
      const freq = 0.008 + Math.random()*0.02;
      const fase = Math.random()*Math.PI*2;
      ctx.moveTo(0, yBase);
      for(let x=0;x<=w;x+=8){
        ctx.lineTo(x, yBase + Math.sin(x*freq+fase)*amp);
      }
      ctx.stroke();
    }
    // vetas finas y nudos ocasionales para romper la uniformidad
    ctx.globalAlpha = 1;
    for(let i=0;i<5;i++){
      const nx = Math.random()*w, ny = Math.random()*h;
      const r = 6+Math.random()*10;
      const grad = ctx.createRadialGradient(nx,ny,0,nx,ny,r*2.2);
      grad.addColorStop(0, tonoVeta);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.ellipse(nx,ny,r,r*1.6,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(repeticionesU, repeticionesV);
    tex.anisotropy = 4;
    return tex;
  }
  const texMaderaClara = generarTexturaMadera('#4a2c17', '#2c1608', 8, 1.4);
  const texMaderaOscura = generarTexturaMadera('#2a1409', '#150a04', 8, 1.4);
  const maderaMat = new THREE.MeshStandardMaterial({map:texMaderaClara, color:0xffffff, roughness:0.68, metalness:0.04});
  const maderaOscuraMat = new THREE.MeshStandardMaterial({map:texMaderaOscura, color:0xffffff, roughness:0.75, metalness:0.03});

  /* material dorado/laton para el turret central, como en una ruleta real */
  const oroMat = new THREE.MeshStandardMaterial({color:0xcda256, metalness:0.9, roughness:0.22});
  const oroOscuroMat = new THREE.MeshStandardMaterial({color:0x8a6a2f, metalness:0.85, roughness:0.3});

  /* disco central de madera "burl" (nogal veteado), como en una mesa real */
  const hubMat = (function(){
    const w=1024,h=1024;
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const ctx=c.getContext('2d');
    const cx=w/2, cy=h/2, radio=w/2;
    const base = ctx.createRadialGradient(cx,cy,0,cx,cy,radio);
    base.addColorStop(0,'#6b4321');
    base.addColorStop(0.45,'#4a2c15');
    base.addColorStop(0.8,'#33200f');
    base.addColorStop(1,'#20130a');
    ctx.fillStyle = base; ctx.fillRect(0,0,w,h);
    // vetas de burl: remolinos concentricos irregulares, no rayos rectos
    for(let i=0;i<220;i++){
      const ang = Math.random()*Math.PI*2;
      const r0 = Math.random()*radio*0.95;
      const largo = 20+Math.random()*90;
      const curv = (Math.random()-0.5)*0.9;
      ctx.strokeStyle = `rgba(20,10,4,${0.08+Math.random()*0.14})`;
      ctx.lineWidth = 1+Math.random()*2.2;
      ctx.beginPath();
      let x = cx+Math.cos(ang)*r0, y = cy+Math.sin(ang)*r0;
      ctx.moveTo(x,y);
      let a = ang + Math.PI/2;
      for(let s=0;s<6;s++){
        a += curv*0.3;
        x += Math.cos(a)*(largo/6);
        y += Math.sin(a)*(largo/6);
        ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    // nudos de burl (manchas ovaladas oscuras concentricas)
    for(let i=0;i<14;i++){
      const nx = cx+(Math.random()-0.5)*radio*1.5, ny = cy+(Math.random()-0.5)*radio*1.5;
      if(Math.hypot(nx-cx,ny-cy) > radio*0.92) continue;
      const r = 8+Math.random()*22;
      for(let ring=4; ring>=1; ring--){
        ctx.strokeStyle = `rgba(15,8,3,${0.10+ring*0.03})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(nx,ny,r*ring/4*1.3,r*ring/4,Math.random()*Math.PI,0,Math.PI*2);
        ctx.stroke();
      }
    }
    // brillo de barniz suave en el centro
    const brillo = ctx.createRadialGradient(cx-radio*0.15,cy-radio*0.2,0,cx,cy,radio*0.9);
    brillo.addColorStop(0,'rgba(255,235,200,0.10)');
    brillo.addColorStop(1,'rgba(255,235,200,0)');
    ctx.fillStyle = brillo; ctx.fillRect(0,0,w,h);
    const tex = new THREE.CanvasTexture(c);
    return new THREE.MeshStandardMaterial({map:tex, roughness:0.32, metalness:0.05});
  })();

  /* ---------- cuenco de madera (fijo) ---------- */
  const maderaGrupo = new THREE.Group();
  wheelAssembly.add(maderaGrupo);

  const paredMadera = new THREE.Mesh(
    new THREE.CylinderGeometry(R_MADERA, R_MADERA*0.9, GROSOR_MADERA, 96, 1, true),
    maderaMat
  );
  paredMadera.position.y = -GROSOR_MADERA*0.55;
  paredMadera.receiveShadow = true;
  maderaGrupo.add(paredMadera);

  const perfilBorde = [
    new THREE.Vector2(R_EXT+0.45, -0.10),
    new THREE.Vector2(R_EXT+1.7,  0.05),
    new THREE.Vector2(R_MADERA*0.80, 0.18),
    new THREE.Vector2(R_MADERA*0.955, 0.24),
    new THREE.Vector2(R_MADERA, 0.14)
  ];
  const caraFrontal = new THREE.Mesh(new THREE.LatheGeometry(perfilBorde, 96), maderaMat);
  caraFrontal.receiveShadow = true;
  maderaGrupo.add(caraFrontal);

  const caraTrasera = new THREE.Mesh(new THREE.CircleGeometry(R_MADERA, 96), maderaOscuraMat);
  caraTrasera.rotation.x = -Math.PI/2;
  caraTrasera.position.y = -GROSOR_MADERA*1.05;
  maderaGrupo.add(caraTrasera);

  /* bisel cromado grueso entre la madera y las casillas */
  const biselExterior = new THREE.Mesh(
    new THREE.CylinderGeometry(R_EXT+0.45, R_EXT+0.12, 0.4, 96, 1, true),
    cromoMat
  );
  biselExterior.position.y = -0.14;
  biselExterior.castShadow = true;
  maderaGrupo.add(biselExterior);

  const RADIO_PISTA = R_EXT + 0.5;
  const ALTURA_PISTA = ALTO_CASILLA + 0.42;
  const pista = new THREE.Mesh(new THREE.TorusGeometry(RADIO_PISTA, 0.09, 16, 96), cromoMat);
  pista.rotation.x = Math.PI/2;
  pista.position.y = ALTURA_PISTA;
  pista.castShadow = true;
  maderaGrupo.add(pista);

  const aroAlto = new THREE.Mesh(
    new THREE.CylinderGeometry(R_EXT+0.035, R_EXT+0.035, 0.1, 96, 1, true),
    cromoOscuroMat
  );
  aroAlto.position.y = ALTO_CASILLA + 0.05;
  aroAlto.castShadow = true;
  maderaGrupo.add(aroAlto);

  /* ---------- disco de casillas (gira) ---------- */
  const ruleta = new THREE.Group();
  wheelAssembly.add(ruleta);

  const piso = new THREE.Mesh(new THREE.CylinderGeometry(R_INT, R_INT, 0.32, 96), hubMat);
  piso.position.y = ALTO_CASILLA/2 + 0.16;
  piso.receiveShadow = true;
  ruleta.add(piso);

  const RADIO_ASENTADA = R_INT + (R_EXT-R_INT)*0.42;
  const canalAsiento = new THREE.Mesh(
    new THREE.TorusGeometry(RADIO_ASENTADA, 0.10, 10, 96),
    new THREE.MeshStandardMaterial({color:0x100a06, roughness:0.9, metalness:0})
  );
  canalAsiento.rotation.x = Math.PI/2;
  canalAsiento.position.y = ALTO_CASILLA/2 + 0.13;
  ruleta.add(canalAsiento);

  /* turret central dorado (laton) tipo "volcan" con brazos, como en una ruleta real */
  const volcanBase = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.95, 0.22, 32), oroMat);
  volcanBase.position.y = ALTO_CASILLA + 0.11;
  volcanBase.castShadow = true;
  ruleta.add(volcanBase);

  const nucleo = new THREE.Mesh(new THREE.SphereGeometry(0.4,32,32), oroMat);
  nucleo.position.y = ALTO_CASILLA + 0.24;
  nucleo.castShadow = true;
  ruleta.add(nucleo);

  const cono = new THREE.Mesh(new THREE.ConeGeometry(0.48,0.9,32), oroMat);
  cono.position.y = ALTO_CASILLA + 0.75;
  cono.castShadow = true;
  ruleta.add(cono);

  for(let i=0;i<4;i++){
    const ang = i*(Math.PI/2) + Math.PI/4;
    const largo = R_INT*0.76;
    const brazo = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.07,largo,12), oroMat);
    brazo.position.set(Math.cos(ang)*largo/2, ALTO_CASILLA+0.24, Math.sin(ang)*largo/2);
    brazo.rotation.z = Math.PI/2;
    brazo.rotation.y = -ang;
    brazo.castShadow = true;
    ruleta.add(brazo);

    const punta = new THREE.Mesh(new THREE.SphereGeometry(0.1,16,16), oroOscuroMat);
    punta.position.set(Math.cos(ang)*largo, ALTO_CASILLA+0.24, Math.sin(ang)*largo);
    punta.castShadow = true;
    ruleta.add(punta);
  }

  function texturaNumero(num, colorFondoHex){
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#' + colorFondoHex.toString(16).padStart(6,'0');
    ctx.fillRect(0,0,128,128);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 64px Georgia';
    // contorno oscuro para que el numero se despegue del fondo con poca luz
    ctx.lineWidth = 6;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(String(num), 64, 70);
    // relleno blanco calido, mas claro que antes para maximo contraste
    ctx.fillStyle = '#fff6e0';
    ctx.fillText(String(num), 64, 70);
    return new THREE.CanvasTexture(c);
  }

  for(let i=0;i<N;i++){
    const num = NUMEROS_ORDEN[i];
    const col = colorDe(num);
    const a0 = i*PASO;

    const pisoCasilla = new THREE.Mesh(
      new THREE.RingGeometry(R_INT-0.05, R_EXT, 8, 1, a0, PASO*0.985),
      new THREE.MeshStandardMaterial({color:col, roughness:0.32, metalness:0.06})
    );
    pisoCasilla.rotation.x = -Math.PI/2;
    pisoCasilla.position.y = ALTO_CASILLA/2 + 0.16;
    pisoCasilla.receiveShadow = true;
    ruleta.add(pisoCasilla);

    const paredMat = new THREE.MeshStandardMaterial({color:col, roughness:0.32, metalness:0.068});
    const pared = new THREE.Mesh(
      new THREE.CylinderGeometry(R_EXT, R_EXT, ALTO_CASILLA, 6, 1, true, a0, PASO*0.92),
      paredMat
    );
    pared.castShadow = true;
    pared.receiveShadow = true;
    ruleta.add(pared);

    const tex = texturaNumero(num, col);
    const etiqueta = new THREE.Mesh(
      new THREE.PlaneGeometry(0.62, 0.62),
      new THREE.MeshStandardMaterial({map:tex, roughness:0.65})
    );
    const angMed = a0 + PASO*0.46;
    const radioEtq = R_EXT - 0.55;
    etiqueta.position.set(Math.cos(angMed)*radioEtq, ALTO_CASILLA/2+0.175, Math.sin(angMed)*radioEtq);
    etiqueta.rotation.x = -Math.PI/2;
    etiqueta.rotation.z = -angMed + Math.PI/2;
    ruleta.add(etiqueta);

    const separador = new THREE.Mesh(
      new THREE.BoxGeometry(0.035, ALTO_CASILLA, R_EXT-R_INT+0.05),
      cromoMat
    );
    separador.position.set(Math.cos(a0)*(R_INT+(R_EXT-R_INT)/2), ALTO_CASILLA/2, Math.sin(a0)*(R_INT+(R_EXT-R_INT)/2));
    separador.rotation.y = -a0;
    separador.castShadow = true;
    ruleta.add(separador);
  }

  /* ================= bola ================= */
  const bola = new THREE.Mesh(
    new THREE.SphereGeometry(0.24, 32, 32),
    new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.15, metalness:0.05})
  );
  bola.castShadow = true;
  wheelAssembly.add(bola);

  /* ================= camara fija, angulo tipo "mesa en vivo" ================= */
  const RADIO_CAM = 9.4, ALTURA_CAM = 7.6, ANGULO_CAM = 0.62;
  camara.position.set(Math.sin(ANGULO_CAM)*RADIO_CAM, ALTURA_CAM, Math.cos(ANGULO_CAM)*RADIO_CAM);
  camara.lookAt(0, ALTO_CASILLA*0.1, 0.2);

  /* ================= animacion ================= */
  const ALTURA_ASENTADA = ALTO_CASILLA + 0.31;

  function easeInOutSuave(x){ return x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function bezierCuad(a,b,c,t){ const u=1-t; return u*u*a + 2*u*t*b + t*t*c; }
  function posicionFinalBola(numero){
    const i = NUMEROS_ORDEN.indexOf(numero);
    return i*PASO + PASO*0.46;
  }

  const K_FRICCION_RUEDA = 0.10;
  const K_FRICCION_BOLA  = 0.22;
  const VEL_BOLA_MIN = 1.15;
  const VEL_IDLE = 0.05;

  let estado = 'asentada';
  let velocidadOciosa = VEL_IDLE;
  let numeroObjetivo = 0;
  let anguloAsentado = posicionFinalBola(0);
  let anguloBolaMundo = 0;
  let tInicioFase = performance.now()/1000;
  let velRuedaGiroInicial = 0, velBolaGiroInicial = 0;
  let caidaOrigen = {radio:RADIO_PISTA, altura:ALTURA_PISTA};
  let segmentosRebote = [];
  let duracionCaidaTotal = 0;
  let callbackFin = null;

  bola.position.set(Math.cos(anguloAsentado)*RADIO_ASENTADA, ALTURA_ASENTADA, Math.sin(anguloAsentado)*RADIO_ASENTADA);

  function generarRebotes(anguloInicio, anguloFinalPrevisto){
    const nSaltos = 5 + Math.floor(Math.random()*2);
    const proporciones = [];
    let sumaPeso = 0;
    for(let i=0;i<nSaltos;i++){ const p = Math.pow(0.72, i); proporciones.push(p); sumaPeso += p; }
    for(let i=0;i<nSaltos;i++) proporciones[i] /= sumaPeso;

    const amplitudBase = (ALTURA_PISTA - ALTURA_ASENTADA);
    let acumT = 0;
    let radioPrev = caidaOrigen.radio, alturaPrev = caidaOrigen.altura, anguloPrev = anguloInicio;
    const segmentos = [];
    for(let i=0;i<nSaltos;i++){
      const esUltimo = i === nSaltos-1;
      const dur = proporciones[i];
      const radioFin = esUltimo ? RADIO_ASENTADA : lerp(caidaOrigen.radio, RADIO_ASENTADA, (i+1)/nSaltos);
      const avanceIdeal = lerp(0, anguloFinalPrevisto-anguloInicio, (i+1)/nSaltos);
      const jitter = esUltimo ? 0 : (Math.random()-0.4)*0.10*(1-i/nSaltos);
      const anguloFin = esUltimo ? anguloFinalPrevisto : anguloInicio + avanceIdeal + jitter;
      const pico = esUltimo ? alturaPrev : ALTURA_ASENTADA + amplitudBase*Math.pow(0.42, i)*(0.85+Math.random()*0.3);
      const alturaFin = ALTURA_ASENTADA;
      segmentos.push({t0:acumT, t1:acumT+dur, r0:radioPrev, r1:radioFin, h0:alturaPrev, hPico:pico, h1:alturaFin, a0:anguloPrev, a1:anguloFin});
      acumT += dur;
      radioPrev = radioFin; alturaPrev = alturaFin; anguloPrev = anguloFin;
    }
    return segmentos;
  }

  function girarHacia(numero, onFin){
    if(estado==='girando' || estado==='cayendo') return false;
    estado = 'girando';
    tInicioFase = performance.now()/1000;
    velRuedaGiroInicial = 2.6 + Math.random()*0.5;
    velBolaGiroInicial = -(7.0 + Math.random()*1.3);
    anguloBolaMundo = anguloAsentado + ruleta.rotation.y;
    numeroObjetivo = numero;
    callbackFin = onFin || null;
    return true;
  }

  let ultimoFrame = performance.now()/1000;
  function reloj(){
    requestAnimationFrame(reloj);
    const ahora = performance.now()/1000;
    const dt = Math.min(0.05, ahora-ultimoFrame);
    ultimoFrame = ahora;

    if(estado === 'girando'){
      const t = ahora - tInicioFase;
      const velRuedaActual = velRuedaGiroInicial * Math.exp(-K_FRICCION_RUEDA*t);
      const velBolaActual  = velBolaGiroInicial  * Math.exp(-K_FRICCION_BOLA*t);
      ruleta.rotation.y += velRuedaActual*dt;
      anguloBolaMundo += velBolaActual*dt;
      bola.position.set(Math.cos(anguloBolaMundo)*RADIO_PISTA, ALTURA_PISTA, Math.sin(anguloBolaMundo)*RADIO_PISTA);

      if(Math.abs(velBolaActual) < VEL_BOLA_MIN){
        estado = 'cayendo';
        tInicioFase = ahora;
        anguloAsentado = posicionFinalBola(numeroObjetivo);
        caidaOrigen = {radio:RADIO_PISTA, altura:ALTURA_PISTA};
        velocidadOciosa = Math.max(velRuedaActual, VEL_IDLE);
        duracionCaidaTotal = 2.6 + Math.random()*0.7;
        const anguloFinalPrevisto = anguloAsentado + ruleta.rotation.y + velocidadOciosa*duracionCaidaTotal;
        segmentosRebote = generarRebotes(anguloBolaMundo, anguloFinalPrevisto);
      }
    } else if(estado === 'cayendo'){
      ruleta.rotation.y += velocidadOciosa*dt;
      const tFrac = (ahora - tInicioFase) / duracionCaidaTotal;
      const tClamp = Math.min(1, tFrac);
      let seg = segmentosRebote[segmentosRebote.length-1];
      for(const s of segmentosRebote){ if(tClamp>=s.t0 && tClamp<=s.t1){ seg=s; break; } }
      const dur = Math.max(1e-4, seg.t1-seg.t0);
      const u = Math.min(1, Math.max(0, (tClamp-seg.t0)/dur));
      const ue = easeInOutSuave(u);
      const radio = lerp(seg.r0, seg.r1, ue);
      const angulo = lerp(seg.a0, seg.a1, ue);
      const altura = bezierCuad(seg.h0, seg.hPico, seg.h1, u);
      bola.position.set(Math.cos(angulo)*radio, altura, Math.sin(angulo)*radio);

      if(tFrac>=1){
        estado='asentada';
        const fn = callbackFin; callbackFin = null;
        if(fn) fn(numeroObjetivo);
      }
    } else if(estado === 'asentada'){
      ruleta.rotation.y += velocidadOciosa*dt;
      const anguloMundo = anguloAsentado + ruleta.rotation.y;
      bola.position.set(Math.cos(anguloMundo)*RADIO_ASENTADA, ALTURA_ASENTADA, Math.sin(anguloMundo)*RADIO_ASENTADA);
    }

    renderer.render(escena, camara);
  }
  ajustarTamano();
  reloj();

  window.Ruleta3D = {
    numeros: NUMEROS_ORDEN,
    colorDe,
    girarHacia,
    estaLibre: ()=> estado==='asentada'
  };
  })();
  </script>
