<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InvestIQ — Microinversión en Bolsa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0f14; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111820; }
    ::-webkit-scrollbar-thumb { background: #2a3545; border-radius: 2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    input[type=range] { height: 4px; border-radius: 2px; background: #1E2835; }
    select option { background: #1E2835; color: #dde4f0; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
