services:
  # ── InvestIQ Stock Exchange (Python/FastAPI) ──────────────────────────────
  - type: web
    name: investiq-api
    env: python
    rootDir: BBD4
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── FXC_BBD Sports Trading Desk (Static Site — standalone HTML) ───────────
  - type: web
    name: sporttrade-fxcbbd
    env: static
    staticPublishPath: SPORTTRADE/frontend
    buildCommand: ""
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
