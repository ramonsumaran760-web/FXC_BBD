services:
  # ── BBD3 Roulette 3D ─────────────────────────────────────────────────────
  - type: web
    name: bbd3-roulette-3d
    env: python
    rootDir: BBD3
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --worker-class gthread --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production

  # ── InvestIQ Stock Exchange (Python/FastAPI) ──────────────────────────────
  - type: web
    name: investiq-api
    env: python
    rootDir: BBD4
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── FXC_BBD Sports Exchange (Python/FastAPI — backend completo) ──────────
  - type: web
    name: sporttrade-fxcbbd
    env: python
    rootDir: SPORTTRADE
    buildCommand: pip install fastapi uvicorn sqlalchemy asyncpg alembic aiohttp python-dotenv pydantic-settings celery redis
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
