version: "3.9"

services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: investiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: investiq
      POSTGRES_USER: investiq
      POSTGRES_PASSWORD: InvestIQ2026!Prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investiq"]
      interval: 10s; timeout: 5s; retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: investiq_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass InvestIQRedis2026!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s; timeout: 5s; retries: 5

  # ── Backend FastAPI ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: investiq_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://investiq:InvestIQ2026!Prod@postgres:5432/investiq
      DATABASE_URL_SYNC: postgresql://investiq:InvestIQ2026!Prod@postgres:5432/investiq
      REDIS_URL: redis://:InvestIQRedis2026!@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-investiq-prod-secret-2026-CHANGE-IN-PROD}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-DEMO_KEY}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-DEMO_SECRET}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend/static:/app/static

  # ── Frontend React ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: investiq_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: investiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
